<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Font Kawaii</title>

  <style>
    /* Tampilan dasar */
    body {
      padding: 32px;
      background: #fffaf3;
      color: #2d2d2d;
      font-size: 20px;
      line-height: 1.8;
    }

    /* Card contoh */
    .sample {
      margin-bottom: 18px;
      padding: 16px 20px;
      border: 1px solid #e8e2d8;
      border-radius: 16px;
      background: #ffffff;
    }

    /* Marshmallow Pop */
    .marshmallow-pop {
      font-family: "Trebuchet MS", "Arial", sans-serif;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* Cupcake Cloud */
    .cupcake-cloud {
      font-family: "Georgia", "Times New Roman", serif;
      font-style: italic;
    }

    /* Pudding Script */
    .pudding-script {
      font-family: "Brush Script MT", "Lucida Handwriting", cursive;
      font-size: 1.15em;
    }

    /* Bunny Bounce */
    .bunny-bounce {
      font-family: "Verdana", "Arial", sans-serif;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    /* Lollipop Loop */
    .lollipop-loop {
      font-family: "Courier New", "Lucida Console", monospace;
      font-weight: 700;
    }

    /* Kawaii Script */
    .kawaii-script {
      font-family: "Segoe Script", "Brush Script MT", cursive;
    }

    /* Chibi Round */
    .chibi-round {
      font-family: "Arial Rounded MT Bold", "Nunito", sans-serif;
      font-weight: 600;
    }

    /* Sakura Sans */
    .sakura-sans {
      font-family: "Helvetica Neue", "Arial", sans-serif;
      font-weight: 500;
    }

    /* Mochi Pop */
    .mochi-pop {
      font-family: "Varela Round", "Arial Rounded MT Bold", sans-serif;
      font-weight: 700;
    }

    /* Pocky Play */
    .pocky-play {
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="sample marshmallow-pop">Marshmallow Pop</div>
  <div class="sample cupcake-cloud">Cupcake Cloud</div>
  <div class="sample pudding-script">Pudding Script</div>
  <div class="sample bunny-bounce">Bunny Bounce</div>
  <div class="sample lollipop-loop">Lollipop Loop</div>
  <div class="sample kawaii-script">Kawaii Script</div>
  <div class="sample chibi-round">Chibi Round</div>
  <div class="sample sakura-sans">Sakura Sans</div>
  <div class="sample mochi-pop">Mochi Pop</div>
  <div class="sample pocky-play">Pocky Play</div>

</body>
</html>
